# 鸣鹤 (MingHe) 服务器配置

[server]
# 监听地址
listen_addr = "0.0.0.0"
# SIP TLS 端口 (SIPS)
sip_port = 5061
# 服务器域名或 IP 地址
# 用于 SIP URI 和 TLS 证书生成
# 可以是域名（如 "minghe.local"）或 IP 地址（如 "192.168.1.100"）
host = "minghe.local"

[extensions]
# 分机号码范围
range_start = 1000
range_end = 2000
# 所有分机的默认密码（未在 [passwords] 中单独配置的分机使用此密码）
default_password = "minghe@2024"

[tls]
# 证书路径（留空则自动生成自签名证书）
# 支持域名证书和 IP 证书
cert_path = ""
key_path = ""

[media]
# RTP 中继端口范围
rtp_port_start = 20000
rtp_port_end = 30000
# 服务器公网/内网 IP（用于 SDP 中的媒体地址）
# 留空则自动检测
media_addr = ""

# 单独为分机设置密码（覆盖 default_password）
# 格式：分机号 = "密码"
# 未列出的分机使用 default_password
[passwords]
# 1001 = "velox@2026"
# 1002 = "alice@2026"
# 1003 = "bob@2026"
